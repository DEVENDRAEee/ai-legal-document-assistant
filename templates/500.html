{% extends 'base.html' %}
{% load static %}

{% block title %}Server Error - AI Legal Document Assistant{% endblock %}

{% block content %}
<div class="container mt-5 pt-4">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg">
                <div class="card-body p-5 text-center">
                    <div class="mb-4">
                        <i class="fas fa-server text-danger" style="font-size: 4rem;"></i>
                    </div>
                    
                    <h1 class="display-1 fw-bold text-danger">500</h1>
                    <h3 class="mb-3">Server Error</h3>
                    <p class="text-muted mb-4">
                        Something went wrong on our end. We're working to fix this issue.
                    </p>
                    
                    <div class="d-grid gap-2 d-md-block">
                        <a href="{% url 'documents:home' %}" class="btn btn-primary">
                            <i class="fas fa-home me-2"></i>Go Home
                        </a>
                        <a href="{% url 'documents:contact' %}" class="btn btn-outline-primary">
                            <i class="fas fa-envelope me-2"></i>Report Issue
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
